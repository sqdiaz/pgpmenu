name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Create ZIP
        run: |
          cd build
          zip -r PGPMenu.zip PGPMenu.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PGPMenu
          path: build/PGPMenu.zip

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/PGPMenu.zip
