name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Sign app (ad-hoc)
        run: codesign --sign - --force --deep build/PGPMenu.app

      - name: Create DMG
        run: make dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PGPMenu
          path: build/PGPMenu.dmg

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/PGPMenu.dmg
